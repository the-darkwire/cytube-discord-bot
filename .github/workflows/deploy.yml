name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: SSH into droplet and redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/cytube-discord-bot
            git fetch --prune origin
            git reset --hard origin/main
            # Clean up any orphan one-shot containers (e.g. a previous deploy that was
            # cancelled mid-run and left a hung `docker compose run` behind).
            docker ps -aq --filter "label=com.docker.compose.oneoff=True" \
              --filter "label=com.docker.compose.project=cytube-discord-bot" \
              | xargs -r docker rm -f
            docker compose up -d --build
            timeout 60 docker compose run --rm bot pnpm deploy-commands
            docker image prune -f
